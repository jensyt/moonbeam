name: Publish to Crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish Crates
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
            components: rustfmt, clippy

      - name: Run comprehensive tests
        run: |
          chmod +x check_all.sh
          ./check_all.sh

      - name: Publish moonbeam-attributes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-attributes"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam-forms
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-forms"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam-serde
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-serde"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Extract Release Notes from CHANGELOG.md
        run: |
          python3 -c "
          import re, sys
          tag = sys.argv[1]
          version = tag.lstrip('v')
          try:
              with open('CHANGELOG.md', 'r') as f:
                  content = f.read()
              pattern = rf'(?s)(##\s*\[{re.escape(version)}\].*?)(?=\n##\s*\[|\n#\s|\Z)'
              match = re.search(pattern, content)
              if match:
                  body = '\n'.join(match.group(1).splitlines()[1:]).strip()
                  with open('release_notes.md', 'w') as out:
                      out.write(body)
                  print('Found release notes for tag ' + tag)
                  sys.exit(0)
          except Exception as e:
              print('Error extracting release notes:', e)
          # Fallback if not found or on error
          print('No changelog entry found for tag ' + tag)
          with open('release_notes.md', 'w') as out:
              out.write('Release ' + tag)
          " "${{ github.ref_name }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          generate_release_notes: false
