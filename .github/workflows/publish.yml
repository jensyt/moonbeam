name: Publish to Crates.io

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Publish Crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
            components: rustfmt, clippy

      - name: Run comprehensive tests
        run: |
          chmod +x check_all.sh
          ./check_all.sh

      - name: Publish moonbeam-attributes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-attributes"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam-forms
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-forms"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
            # Small delay to let crates.io index update
            sleep 10
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi

      - name: Publish moonbeam-serde
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          NAME="moonbeam-serde"
          VERSION=$(grep '^version =' "$NAME/Cargo.toml" | head -1 | cut -d '"' -f 2)

          # Check if this version already exists on crates.io
          STATUS=$(curl -s -L -A "Moonbeam-CI (https://github.com/jensyt/moonbeam)" -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/$NAME/$VERSION")
          if [ "$STATUS" = "200" ]; then
            echo "$NAME v$VERSION is already on crates.io. Skipping."
          elif [ "$STATUS" = "404" ]; then
            echo "Publishing $NAME v$VERSION..."
            cargo publish -p "$NAME" --no-verify
          else
            echo "Error: Crates.io API returned $STATUS"
            exit 1
          fi
