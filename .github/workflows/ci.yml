name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  RUSTFLAGS: "-D warnings"

jobs:
  check-all:
    name: Run all checks
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Run check_all.sh
      run: |
        chmod +x check_all.sh
        ./check_all.sh

  test-simd:
    name: Test SIMD Variants
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: "x86_64 Default (SSE2)"
            rustflags: ""
            features: ""
          - name: "x86_64 SSE4.2"
            rustflags: "-C target-feature=+sse4.2"
            features: ""
          - name: "Fallback (No SSE)"
            rustflags: ""
            features: "--features disable-simd"

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Run Tests
      working-directory: moonbeam
      run: cargo test --lib ${{ matrix.features }} -- server::parsing
      env:
        RUSTFLAGS: ${{ env.RUSTFLAGS }} ${{ matrix.rustflags }}
