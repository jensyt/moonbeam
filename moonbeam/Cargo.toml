[package]
name = "moonbeam"
version = "0.3.1"
edition.workspace = true
authors.workspace = true
description.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
license.workspace = true
readme.workspace = true

[dependencies]
httparse = "1.10"
httpdate = "1.0"
futures-lite = {version = "2.6", default-features = false, features = ["std"]}
async-executor = {version = "1.13", features = ["static"]}
async-io = "2.6"
async-net = "2.0"
tracing = {version = "0.1", optional = true}
async-signal = {version = "0.2", optional = true}
blocking = "1.6"
percent-encoding = "2.3"
moonbeam-attributes = {path = "../moonbeam-attributes", optional = true}
flate2 = {version = "1.1", optional = true}
brotli = {version = "8", optional = true, features = ["std"]}
flume = {version = "0.12", default-features = false, features = ["async"]}

[features]
default = ["assets", "macros", "catchpanic", "signals", "router"]
signals = ["dep:async-signal"]
tracing = ["dep:tracing"]
assets = []
macros = ["dep:moonbeam-attributes"]
catchpanic = []
compress = ["dep:flate2", "dep:brotli"]
router = ["macros", "moonbeam-attributes/router", "moonbeam-attributes/autohead"]
mt = []
disable-simd = []

[dev-dependencies]
piper = "0.2"

[[example]]
name = "hello_world"
required-features = ["macros"]

[[example]]
name = "stateful"
required-features = ["macros"]

[[example]]
name = "router"
required-features = ["router"]

[[example]]
name = "middleware"
required-features = ["router"]

[[example]]
name = "stateless_router"
required-features = ["router"]

[[example]]
name = "multi_threaded"
required-features = ["mt", "macros"]

[[test]]
name = "head_request"
required-features = ["router"]

[[test]]
name = "rest_param"
required-features = ["router"]

[[test]]
name = "result_handler"
required-features = ["router"]

[[test]]
name = "routing"
required-features = ["router"]
