[package]
name = "moonbeam"
version = "0.3.0"
edition.workspace = true
authors.workspace = true
description.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
license.workspace = true
readme.workspace = true

[dependencies]
httparse = "1.10"
httpdate = "1.0"
futures-lite = {version = "2.6", default-features = false, features = ["std"]}
async-executor = {version = "1.13", features = ["static"]}
async-io = "2.6"
async-net = "2.0"
tracing = {version = "0.1", optional = true}
async-signal = {version = "0.2", optional = true}
blocking = "1.6"
percent-encoding = "2.3"
moonbeam-attributes = {path = "../moonbeam-attributes", optional = true}
async-compression = {version = "0.4", features = ["gzip", "brotli", "zlib", "futures-io"], optional = true}
flume = {version = "0.12", default-features = false, features = ["async"]}

[features]
default = ["assets", "macros", "catchpanic", "signals", "router"]
signals = ["dep:async-signal"]
tracing = ["dep:tracing"]
assets = []
macros = ["dep:moonbeam-attributes"]
catchpanic = []
compress = ["dep:async-compression"]
router = ["macros", "moonbeam-attributes/router"]
mt = []

[dev-dependencies]
piper = "0.2"
flate2 = "1.0"
brotli = "6"
