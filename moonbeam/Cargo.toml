[package]
name = "moonbeam"
version = "0.2.1"
edition.workspace = true
authors.workspace = true
description.workspace = true
keywords.workspace = true
categories.workspace = true
repository.workspace = true
license.workspace = true
readme.workspace = true

[dependencies]
httparse = "1.10"
httpdate = "1.0"
futures-lite = {version = "2.6", default-features = false, features = ["std"]}
async-executor = {version = "1.13", features = ["static"]}
async-io = "2.6"
async-net = "2.0"
tracing = {version = "0.1", optional = true}
async-signal = "0.2"
async-fs = {version = "2.2", optional = true}
percent-encoding = "2.3"
moonbeam-attributes = {path = "../moonbeam-attributes", optional = true}
async-compression = {version = "0.4", features = ["gzip", "brotli", "zlib", "futures-io"], optional = true}

[features]
default = ["asyncfs", "assets", "macros", "catchpanic"]
tracing = ["dep:tracing"]
asyncfs = ["dep:async-fs"]
assets = ["asyncfs"]
macros = ["dep:moonbeam-attributes"]
catchpanic = []
compress = ["dep:async-compression"]

[dev-dependencies]
piper = "0.2"
flate2 = "1.0"
brotli = "6"
